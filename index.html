<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PelisPlus - Reproductor Estable</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .video-container { width: 100%; max-width: 900px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="p2p-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
            <source src="https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download%26id=1-tWf-ukFmnYdapiix577qm_-BncoDs8S" type="video/mp4">
        </video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('p2p-player');
        
        // Si el video pesa más de 100MB, Google muestra un aviso de virus que rompe el reproductor.
        // En ese caso, la única solución es usar un iframe de un servicio externo.
        player.on('error', function() {
            console.log("El archivo es demasiado grande o la cuota excedió. Cambiando a modo Embed...");
        });
    </script>
</body>
</html>
