<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PelisPlus P2P - Reproductor Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* Estilo tipo Cinema */
        body { 
            background-color: #050505; 
            color: #eee; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding-top: 20px;
        }
        .player-wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 10px;
            box-sizing: border-box;
        }
        .video-container { 
            position: relative;
            background-color: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }
        h2 { 
            font-size: 1.2rem;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        #p2p-info { 
            margin-top: 15px; 
            padding: 10px 20px;
            background: #111;
            border-radius: 20px;
            font-size: 12px; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            border: 1px solid #333;
        }
        .vjs-big-play-centered .vjs-big-play-button {
            background-color: rgba(0, 255, 0, 0.5) !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            margin-top: -40px !important;
            margin-left: -40px !important;
        }
    </style>
</head>
<body>

    <h2>PelisPlus P2P Player</h2>

    <div class="player-wrapper">
        <div class="video-container">
            <video id="p2p-player" class="video-js vjs-default-skin vjs-big-play-centered vjs-16-9" controls preload="auto"></video>
        </div>
    </div>

    <div id="p2p-info">📡 Buscando señal P2P...</div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p2p-media-loader-core@latest/build/p2p-media-loader-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@latest/build/p2p-media-loader-hlsjs.min.js"></script>

    <script>
        // Tu enlace directo que ya sabemos que funciona con el proxy
        var streamUrl = 'https://s6d.ecofriendlytech.shop/v4/hz/iece9/cf-master.1772761448.txt';
        var finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(streamUrl);

        if (p2pml.hlsjs.Engine.isSupported()) {
            var engine = new p2pml.hlsjs.Engine();
            var player = videojs('p2p-player', {
                fluid: true,
                html5: {
                    vhs: { overrideNative: true },
                    hlsjsConfig: {
                        strictSceneDesign: false,
                        checkPurity: false
                    }
                }
            });

            p2pml.hlsjs.initVideoJsPlayerHandlers(player);

            player.src({
                src: finalUrl,
                type: 'application/x-mpegURL'
            });

            engine.on("piece_downloaded", (method, size) => {
                const modo = method === 'p2p' ? '🔵 P2P COMPARTIENDO' : '🌐 SERVIDOR DIRECTO';
                document.getElementById('p2p-info').innerText = `ESTADO: ${modo} | DATOS: ${(size/1024).toFixed(0)} KB`;
            });
        } else {
            var player = videojs('p2p-player');
            player.src({ src: finalUrl, type: 'application/x-mpegURL' });
            document.getElementById('p2p-info').innerText = "MODO NORMAL (SIN P2P)";
        }
    </script>
</body>
</html>
