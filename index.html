<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PelisPlus P2P - Reproductor</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cdnbye@latest/dist/clappr-p2p-plugin.min.js"></script>
    <style>
        body { background-color: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        #player { width: 100%; max-width: 900px; border: 2px solid #222; }
        #status { color: #0f0; margin-top: 15px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

    <div id="player"></div>
    <div id="status">Iniciando Red P2P...</div>

    <script>
        var player = new Clappr.Player({
            source: 'https://s6d.ecofriendlytech.shop/v4/hz/iece9/cf-master.1772761448.txt',
            parentId: '#player',
            autoPlay: false,
            width: '100%',
            height: '100%',
            mimeType: 'application/x-mpegURL', // Forzamos a que lea el .txt como video
            plugins: [CDNByeClapprPlugin],
            p2pConfig: {
                logLevel: 'debug',
            }
        });

        player.on(Clappr.Events.PLAYER_PLAY, function() {
            document.getElementById('status').innerText = "Reproduciendo con P2P Activo 🔵";
        });
    </script>
</body>
</html>
